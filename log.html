<title>magkcod</title>

<style>
body{
    background-color: midnightblue;
    margin: 0;
    font-family: Arial, sans-serif;
}

/* ===== Top Bar ===== */
.top{
    background-color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 20px;
    border-radius: 20px;
    margin: 10px;
    flex-wrap: wrap; /* مهم للجوال */
}

.top h1{
    margin: 0;
    color: black;
}

.top ul{
    padding: 0;
    margin: 0;
}

.top li{
    list-style: none;
    display: inline-block;
    margin-left: 15px;
}

.top li a{
    text-decoration: none;
    color: black;
    font-weight: bold;
}

/* ===== Buttons ===== */
button{
    background-color: blue;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 18px;
    border-radius: 40px;
    cursor: pointer;
}

/* ===== Cards ===== */
.container{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    padding: 20px;
}

.container section{
    background: white;
    padding: 20px;
    border-radius: 30px;
    text-align: center;
}

/* ===== Responsive ===== */
@media (max-width: 600px){
    .container{
        grid-template-columns: 1fr;
    }

    .top{
        flex-direction: column;
        text-align: center;
    }

    .top li{
        margin: 10px;
    }

    button{
        width: 80%;
    }
}
</style>
</head>
